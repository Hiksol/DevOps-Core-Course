---
# INSTALL BLOCK
- name: Install Docker
  block:

    - name: Install dependencies
      apt:
        name:
          - ca-certificates
          - gnupg
        state: present
        update_cache: yes

    - name: Add Docker GPG key
      apt_key:
        url: https://download.docker.com/linux/ubuntu/gpg
        state: present

    - name: Add Docker repository
      apt_repository:
        repo: "deb https://download.docker.com/linux/ubuntu {{ ansible_distribution_release }} stable"
        state: present

    - name: Install Docker packages
      apt:
        name:
          - docker-ce
          - docker-ce-cli
          - containerd.io
          - python3-docker
        state: present
        update_cache: yes

  rescue:
    - name: Retry apt update after GPG failure
      command: apt-get update --fix-missing

  always:
    - name: Ensure Docker service enabled
      service:
        name: docker
        state: started
        enabled: yes

  become: true
  tags:
    - docker_install

# CONFIG BLOCK
- name: Configure Docker
  block:

    - name: Add user to docker group
      user:
        name: "{{ docker_user }}"
        groups: docker
        append: yes

  become: true
  tags:
    - docker_config

