version: "3.8"

services:

  loki:
    image: grafana/loki:3.0.0
    mem_limit: 1g
    cpus: 1.0

    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:3100/ready || exit 1"]
      interval: 12s
      timeout: 5s
      retries: 15
      start_period: 10s


    command: -config.file=/etc/loki/config.yml
    ports:
      - "3100:3100"
    volumes:
      - ./loki/config.yml:/etc/loki/config.yml
      - loki-data:/loki
    networks:
      - logging

  promtail:
    image: grafana/promtail:3.0.0
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 1G
        reservations:
          cpus: "0.5"
          memory: 512M

    command: -config.file=/etc/promtail/config.yml
    volumes:
      - ./promtail/config.yml:/etc/promtail/config.yml
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    ports:
      - "9080:9080"
    networks:
      - logging

  grafana:
    image: grafana/grafana:12.3.1
    mem_limit: 512m
    cpus: 0.5

    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:3000/api/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

    ports:
      - "3000:3000"
    environment:
      - GF_AUTH_ANONYMOUS_ENABLED=false
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD}
    volumes:
      - grafana-data:/var/lib/grafana
    networks:
      - logging

  app-python:
    image: hiksol/devops-info-service:latest
    mem_limit: 256m
    cpus: 0.5

    environment:
      - HOST=0.0.0.0
      - PORT=5000
      - DATA_DIR=/data
      - VISITS_FILE=/data/visits
      - APP_CONFIG_FILE=/config/config.json
      - APP_NAME=devops-info-service
      - APP_ENV=dev
      - LOG_LEVEL=INFO

    healthcheck:
      test: ["CMD-SHELL", "python3 -c \"import urllib.request; urllib.request.urlopen('http://localhost:5000/health')\" || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 15

    ports:
      - "5000:5000"
    volumes:
      - ./data:/data
      - ./config:/config:ro
    networks:
      - logging
    labels:
      logging: "promtail"
      app: "devops-python"

  prometheus:
    image: prom/prometheus:v3.9.0
    mem_limit: 1g
    cpus: 1.0
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.retention.time=15d'
      - '--storage.tsdb.retention.size=10GB'
    networks:
      - logging
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:9090/-/healthy || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  loki-data:
  grafana-data:
  prometheus-data:

networks:
  logging:
