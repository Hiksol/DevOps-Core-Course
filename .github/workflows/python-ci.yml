name: Python CI

on:
  push:
    paths:
      - "app_python/**"
      - ".github/workflows/python-ci.yml"
  pull_request:
    paths:
      - "app_python/**"

jobs:
  build:
    runs-on: ubuntu-latest
    concurrency:
      group: python-ci-${{ github.ref }}
      cancel-in-progress: true

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: "pip"

      - name: Install dependencies
        run: |
          pip install -r app_python/requirements.txt
          pip install -r app_python/requirements-dev.txt

      - name: Lint with ruff
        run: ruff check app_python

      - name: Run tests
        run: pytest app_python/tests --cov=app_python --cov-report=xml

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: ./app_python
          push: true
          tags: |
            hiksol/devops-info-service:latest
            hiksol/devops-info-service:${{ github.run_number }}

      - name: Snyk Security Scan
        uses: snyk/actions/python@master
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          args: --file=app_python/requirements.txt --skip-unresolved
